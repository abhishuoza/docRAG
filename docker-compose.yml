services:
  docrag:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - docrag_data:/app/data
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  docrag_data:
